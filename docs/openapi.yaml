      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Pet"

    # --- Vet Visit ---
    VetVisit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pet_id:
          type: string
          format: uuid
        vet_name:
          type: string
          example: "Dr. Martínez"
        visit_date:
          type: string
          format: date
          example: "2026-05-15"
        reason:
          type: string
          example: "Revisión anual"
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateVetVisitRequest:
      type: object
