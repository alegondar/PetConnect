          example: "vaccination"
        event_date:
          type: string
          format: date
          example: "2026-05-10"
        value:
          type: string
          nullable: true
          example: "Rabia"
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

